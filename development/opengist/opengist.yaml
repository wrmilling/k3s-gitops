---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opengist
  namespace: development
spec:
  releaseName: opengist
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts/
      chart: app-template
      version: 5.0.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/thomiceli/opengist
              pullPolicy: IfNotPresent
              tag: 1.13.1@sha256:dddc26031d1320ebb4bc5b913b3c42a9cb84c7528192d387f99ddcbbe57b0085
            env:
              TZ: America/Chicago
              UID: 1000
              GID: 1000
              OG_CUSTOM_LOGO: "logo.png"
              OG_CUSTOM_FAVICON: "logo-32.png"
              OG_EXTERNAL_URL: "https://gist.${SECRET_DOMAIN}"
              OG_GITEA_CLIENT_KEY: "${SECRET_OPENGIST_GITEA_CLIENT_KEY}"
              OG_GITEA_SECRET: "${SECRET_OPENGIST_GITEA_SECRET}"
              OG_GITEA_URL: "https://git.${SECRET_DOMAIN}/"
              OG_GITEA_NAME: "The Homelab Git"
              OG_SSH_GIT_ENABLED: "false"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "Always"
    service:
      main:
        controller: main
        ports:
          http:
            port: 6157
    route:
      main:
        hostnames:
          - gist.${SECRET_DOMAIN}
        parentRefs:
          - namespace: kube-system
            name: external
            sectionName: https
    persistence:
      data:
        enabled: true
        existingClaim: opengist-data-pvc
        globalMounts:
          - path: /opengist
