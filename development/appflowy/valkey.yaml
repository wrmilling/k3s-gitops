---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: appflowy-valkey
  namespace: development
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://charts.bitnami.com/bitnami
      chart: valkey
      version: 6.2.2
      sourceRef:
        kind: HelmRepository
        name: bitnami-charts
        namespace: flux-system
      interval: 5m
  values:
    primary:
      persistence:
        enabled: true
        existingClaim: "appflowy-valkey-data"
      resourcesPreset: "nano"
      podAnnotations:
        reloader.stakater.com/auto: "true"
    replica:
      replicaCount: 0
    metrics:
      enabled: true
    auth:
      password: ${SECRET_APPFLOWY_REDIS_PASSWORD}
