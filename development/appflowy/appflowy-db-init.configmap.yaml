---
apiVersion: v1
kind: ConfigMap
metadata:
  name: appflowy-db-init
  namespace: development
data:
  # Mounted at /initdb/appflowy.sql inside the postgres-init initContainer.
  # postgres-init runs this once, as the CNPG superuser, right after it
  # creates the "appflowy" database -- before ownership is handed to the
  # appflowy role. AppFlowy's sqlx migrations require both extensions to
  # already exist; a non-superuser DB owner can't CREATE EXTENSION on its own.
  appflowy.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
