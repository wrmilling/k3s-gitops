---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://charts.rook.io/release
      chart: rook-ceph
      version: v1.20.2
      sourceRef:
        kind: HelmRepository
        name: rook-ceph-charts
        namespace: flux-system
      interval: 5m
  values:
    crds:
      enabled: false
    pspEnable: false
    csi:
      # Rook v1.20: CSI drivers are managed by the ceph-csi-operator. This flag
      # installs the operator subchart; all driver/plugin settings (kubeletDirPath,
      # host networking, plugin tolerations, CephFS enable/disable) now live in the
      # ceph-csi-drivers HelmRelease (rook-ceph/csi/ceph-csi-drivers.yaml).
      installCsiOperator: true
    resources:
      limits:
        cpu: 1000m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    monitoring:
      enabled: true