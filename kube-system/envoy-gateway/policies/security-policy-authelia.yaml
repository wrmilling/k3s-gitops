---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authelia-ext-auth
  namespace: kube-system
spec:
  # Gateway-scoped default: applies to every route on both gateways unless
  # that route has its own more-specific SecurityPolicy (see the per-app
  # "*-no-authz" policies), which fully overrides this one for that route.
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external
      sectionName: https
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
      sectionName: https
  extAuth:
    headersToExtAuth:
      - 'accept'
      - 'cookie'
      - 'authorization'
      - 'proxy-authorization'
      - 'x-forwarded-proto'
    failOpen: false
    http:
      backendRefs:
        - name: authelia
          namespace: kube-system
          port: 80
      path: '/api/authz/ext-authz/'
      headersToBackend:
        - Remote-User
        - Remote-Groups
        - Remote-Name
        - Remote-Email