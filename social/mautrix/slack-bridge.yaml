---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slack-bridge
  namespace: social
spec:
  releaseName: slack-bridge
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts/
      chart: app-template
      version: 4.6.2
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  values:
    controllers:
      main:
        type: statefulset
        strategy: RollingUpdate
        replicas: 1
        annotations:
          secret.reloader.stakater.com/reload: "slack-bridge-secrets"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3
            env:
              INIT_POSTGRES_HOST: synapse-psql-v17-rw.default.svc.cluster.local
              INIT_POSTGRES_SUPER_PASS: ${SECRET_CNPG_SUPER_PASS}
              INIT_POSTGRES_DBNAME: mautrix-slack
              INIT_POSTGRES_USER: mautrix-slack
              INIT_POSTGRES_PASS: ${SECRET_MAUTRIX_SLACK_DB_PASS}
        containers:
          main:
            image:
              repository: dock.mau.dev/mautrix/slack
              pullPolicy: IfNotPresent
              tag: v26.03@sha256:1c3d23b96ae160a0c1e02d2dc37d7ecd207f829c360f15c4e4998b57206e863d
            command: ["/usr/bin/mautrix-slack", "--no-update"]
            env:
              TZ: America/Chicago
              UID: 1000
              GID: 1000
    service:
      main:
        type: ClusterIP
        controller: main
        publishNotReadyAddresses: true
        ports:
          http:
            port: 29335
    route:
      main:
        hostnames:
          - mbridge-slack.${SECRET_DOMAIN}
        parentRefs:
          - namespace: kube-system
            name: external
            sectionName: https
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    persistence:
      config:
        enabled: true
        existingClaim: mautrix-slack-data-pvc
        globalMounts:
          - path: /data
      configyaml:
        type: secret
        name: slack-bridge-secrets
        globalMounts:
          - path: /data/config.yaml
            subPath: config.yaml
            readOnly: true
