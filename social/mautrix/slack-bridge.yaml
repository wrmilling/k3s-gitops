---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slack-bridge
  namespace: social
spec:
  releaseName: slack-bridge
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts/
      chart: app-template
      version: 5.0.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      main:
        type: statefulset
        strategy: RollingUpdate
        replicas: 1
        annotations:
          secret.reloader.stakater.com/reload: "slack-bridge-secrets"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4
            env:
              INIT_POSTGRES_HOST: synapse-psql-v17-rw.default.svc.cluster.local
              INIT_POSTGRES_SUPER_PASS: ${SECRET_CNPG_SUPER_PASS}
              INIT_POSTGRES_DBNAME: mautrix-slack
              INIT_POSTGRES_USER: mautrix-slack
              INIT_POSTGRES_PASS: ${SECRET_MAUTRIX_SLACK_DB_PASS}
        containers:
          main:
            image:
              repository: ghcr.io/wrmilling/mautrix-slack
              pullPolicy: IfNotPresent
              tag: sha-e638927@sha256:713cc857a950e49586cb5d6d29b1ac8de49f4d887b6541d6db85070741cd86fc
            command: ["/usr/bin/mautrix-slack", "--no-update"]
            env:
              TZ: America/Chicago
              UID: 1000
              GID: 1000
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      main:
        type: ClusterIP
        controller: main
        publishNotReadyAddresses: true
        ports:
          http:
            port: 29335
    route:
      main:
        hostnames:
          - mbridge-slack.${SECRET_DOMAIN}
        parentRefs:
          - namespace: kube-system
            name: external
            sectionName: https
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    persistence:
      config:
        enabled: true
        existingClaim: mautrix-slack-data-pvc
        globalMounts:
          - path: /data
      configyaml:
        type: secret
        name: slack-bridge-secrets
        globalMounts:
          - path: /data/config.yaml
            subPath: config.yaml
            readOnly: true
